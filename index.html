<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Pro | Vlastné Pozadie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .visualizer-container {
            position: relative;
            width: 100%;
            height: 500px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #visualizerCanvas {
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .btn-gradient {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .progress-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 15px;
        }

        .eq-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .eq-card:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
        }

        .sidebar {
            height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .shorts-mode {
            width: 281px !important;
            height: 500px !important;
            margin: 0 auto;
        }

        .active-style {
            border-color: var(--primary) !important;
            background: rgba(0, 242, 255, 0.1) !important;
        }
    </style>
</head>
<body class="p-5">

    <div class="flex flex-col lg:flex-row gap-6 h-screen">
        
        <!-- SIDEBAR -->
        <div class="lg:w-1/4 flex flex-col gap-4">
            <div class="glass-panel p-6 text-center">
                <h1 class="cyber-font text-2xl text-cyan-400 mb-2 tracking-tighter">SPECTRUM <span class="text-white">PRO</span></h1>
                <p class="text-gray-400 text-xs">Vlastné pozadie a vizuály</p>
            </div>

            <div class="glass-panel p-4 flex flex-col gap-4">
                <h3 class="font-bold uppercase text-[10px] text-primary tracking-widest text-center">Nastavenia obrazu</h3>
                <div class="flex flex-col gap-2">
                    <button onclick="document.getElementById('bgUpload').click()" class="w-full py-2 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-bold border border-white/10 transition flex items-center justify-center gap-2">
                        <i class="fas fa-image"></i> NAHRAŤ POZADIE (16:9)
                    </button>
                    <button id="clearBgBtn" class="w-full py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-[10px] font-bold border border-red-500/20 hidden transition" onclick="clearBg()">
                        VYMAZAŤ POZADIE
                    </button>
                    <input type="file" id="bgUpload" accept="image/*" class="hidden">
                </div>
            </div>

            <div class="glass-panel p-4 sidebar flex-grow">
                <h3 class="font-bold mb-4 uppercase text-[10px] text-primary tracking-widest text-center">Výber štýlu</h3>
                <div id="proList" class="space-y-2">
                    <!-- Štýly sa vygenerujú automaticky -->
                </div>
            </div>
        </div>

        <!-- MAIN -->
        <div class="lg:w-3/4 flex flex-col gap-6">
            <div class="glass-panel p-6 flex-grow flex flex-col relative">
                
                <!-- Export Progress Overlay -->
                <div id="exportOverlay" class="progress-overlay hidden">
                    <div class="cyber-font text-xl text-primary mb-4 animate-pulse">EXPORTUJEM VIDEO S POZADÍM...</div>
                    <div class="w-64 h-2 bg-gray-800 rounded-full overflow-hidden">
                        <div id="exportBar" class="h-full bg-primary w-0 transition-all duration-300"></div>
                    </div>
                    <p id="exportStatus" class="text-xs text-gray-400 mt-2 uppercase tracking-widest">Video obsahuje hudbu, vizuál aj pozadie</p>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <div class="flex gap-2">
                        <button onclick="setFormat('normal')" id="btnNormal" class="px-4 py-1 rounded-full border border-primary text-[10px] cyber-font text-primary">WIDE 16:9</button>
                        <button onclick="setFormat('shorts')" id="btnShorts" class="px-4 py-1 rounded-full border border-gray-600 text-[10px] cyber-font text-gray-400">SHORTS 9:16</button>
                    </div>
                    <div id="statusTag" class="text-[10px] bg-cyan-500/20 px-3 py-1 rounded-full uppercase font-bold text-primary">Prémiový prístup aktívny</div>
                </div>

                <div class="visualizer-container" id="canvasWrapper">
                    <canvas id="visualizerCanvas"></canvas>
                    <div id="dropZone" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 border-2 border-dashed border-primary/30 m-4 rounded-xl cursor-pointer hover:bg-black/60 transition z-20">
                        <i class="fas fa-music text-4xl mb-4 text-primary"></i>
                        <p class="cyber-font text-sm">VLOŽTE SKLADBU</p>
                        <p class="text-[10px] text-gray-500 mt-2 italic">MP3 sa spojí s vaším pozadím</p>
                        <input type="file" id="audioUpload" accept="audio/*" class="hidden">
                    </div>
                </div>

                <div class="mt-6 flex flex-col md:flex-row gap-4">
                    <div class="flex-grow glass-panel bg-black/40 p-4 rounded-xl flex items-center gap-4">
                        <button id="playBtn" class="w-12 h-12 rounded-full bg-primary text-black flex items-center justify-center shadow-[0_0_20px_rgba(0,242,255,0.4)]">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="flex-grow">
                            <p id="trackName" class="text-xs text-gray-400 uppercase font-bold truncate max-w-[200px]">Ticho</p>
                            <div class="h-1 bg-gray-800 rounded-full mt-2 overflow-hidden">
                                <div id="progressBar" class="h-full bg-primary w-0"></div>
                            </div>
                        </div>
                    </div>
                    <button id="autoExportBtn" class="px-10 btn-gradient rounded-xl cyber-font font-bold text-sm tracking-tighter py-4 shadow-lg flex items-center gap-3">
                        <i class="fas fa-magic"></i> AUTOMATICKÝ EXPORT S HUDBOU
                    </button>
                </div>
            </div>
        </div>
    </div>

    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <script>
        const DB_NAME = 'SpectrumProDB';
        const STORE_NAME = 'userSettings';
        let db, audioCtx, analyser, source, dataArray, animationId;
        let selectedStyle = 1;
        let bgImage = null;

        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('mainAudio');
        const audioUpload = document.getElementById('audioUpload');
        const dropZone = document.getElementById('dropZone');
        const bgUpload = document.getElementById('bgUpload');
        const clearBgBtn = document.getElementById('clearBgBtn');

        // IndexedDB
        async function initDB() {
            return new Promise(res => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
                req.onsuccess = e => { db = e.target.result; res(); };
            });
        }

        async function save(k, v) { if(db) db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(v, k); }
        async function load(k) { return new Promise(res => {
            if(!db) return res(null);
            const req = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(k);
            req.onsuccess = () => res(req.result);
        });}

        window.onload = async () => {
            await initDB();
            resize();
            
            // Generovanie zoznamu - Všetko Zadarmo
            const list = document.getElementById('proList');
            for(let i=1; i<=100; i++) {
                const d = document.createElement('div');
                d.id = `eq-${i}`;
                d.className = "eq-card p-3 bg-white/5 border border-white/5 rounded-xl flex items-center gap-3 group";
                d.innerHTML = `
                    <div class="w-8 h-8 rounded bg-primary/20 flex items-center justify-center text-[10px] text-primary font-bold">${i}</div>
                    <span class="text-xs font-bold text-gray-300">Vizuál #${i}</span>
                    <i class="fas fa-check-circle ml-auto text-[10px] text-primary opacity-50"></i>
                `;
                d.onclick = () => selectEQ(i);
                list.appendChild(d);
            }

            const s = await load('style'); 
            selectEQ(s || 1);

            // Obnovenie pozadia z pamäte ak existuje
            const savedBg = await load('userBackground');
            if(savedBg) {
                const img = new Image();
                img.onload = () => {
                    bgImage = img;
                    clearBgBtn.classList.remove('hidden');
                };
                img.src = savedBg;
            }
        };

        function resize() {
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
        }

        // Nahrávanie pozadia
        bgUpload.onchange = e => {
            const f = e.target.files[0];
            if(f) {
                const reader = new FileReader();
                reader.onload = event => {
                    const img = new Image();
                    img.onload = () => {
                        bgImage = img;
                        save('userBackground', event.target.result);
                        clearBgBtn.classList.remove('hidden');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(f);
            }
        };

        function clearBg() {
            bgImage = null;
            save('userBackground', null);
            clearBgBtn.classList.add('hidden');
        }

        dropZone.onclick = () => audioUpload.click();
        audioUpload.onchange = e => {
            const f = e.target.files[0];
            if(f) {
                audio.src = URL.createObjectURL(f);
                document.getElementById('trackName').innerText = f.name;
                dropZone.classList.add('hidden');
                initAudio();
            }
        };

        function initAudio() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 512;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (!animationId) draw();
        }

        function draw() {
            animationId = requestAnimationFrame(draw);
            
            // Vymazanie plátna
            ctx.clearRect(0,0,canvas.width,canvas.height);

            // Vykreslenie pozadia
            if(bgImage) {
                // Zachovanie pomeru strán pri vykresľovaní obrázka
                const scale = Math.max(canvas.width / bgImage.width, canvas.height / bgImage.height);
                const x = (canvas.width / 2) - (bgImage.width / 2) * scale;
                const y = (canvas.height / 2) - (bgImage.height / 2) * scale;
                ctx.drawImage(bgImage, x, y, bgImage.width * scale, bgImage.height * scale);
                
                // Jemné stmavenie obrázka aby ekvalizér vynikol
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
            } else {
                // Predvolené tmavé pozadie ak nie je obrázok
                ctx.fillStyle = '#000';
                ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            if(!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            const cx = canvas.width/2;
            const cy = canvas.height/2;
            const r = 150;

            // Vizualizácia ekvalizéra
            for(let i=0; i<dataArray.length; i++) {
                const angle = (i/dataArray.length) * Math.PI * 2;
                const val = dataArray[i];
                const h = (val/255) * (100 + (selectedStyle % 10) * 15);
                
                ctx.beginPath();
                ctx.strokeStyle = `hsl(${(i/dataArray.length)*360 + selectedStyle*45}, 100%, 50%)`;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                
                ctx.moveTo(cx + Math.cos(angle)*r, cy + Math.sin(angle)*r);
                ctx.lineTo(cx + Math.cos(angle)*(r+h), cy + Math.sin(angle)*(r+h));
                ctx.stroke();
            }
            
            // Stredový pulzujúci efekt
            let bass = 0;
            for(let i=0; i<10; i++) bass += dataArray[i];
            bass = bass / 10;
            
            ctx.beginPath();
            ctx.arc(cx, cy, r - 5 + (bass/255)*10, 0, Math.PI*2);
            ctx.fillStyle = `rgba(0, 242, 255, ${(bass/255)*0.3})`;
            ctx.fill();
        }

        function selectEQ(id) {
            selectedStyle = id;
            save('style', id);
            
            document.querySelectorAll('.eq-card').forEach(el => el.classList.remove('active-style'));
            const active = document.getElementById(`eq-${id}`);
            if(active) active.classList.add('active-style');
            
            document.getElementById('statusTag').innerText = `Štýl ${id} Aktívny (FREE)`;
        }

        // --- AUTOMATICKÝ EXPORT ---
        const autoExportBtn = document.getElementById('autoExportBtn');
        autoExportBtn.onclick = async () => {
            if(!audio.src) return alert("Najprv nahraj hudbu!");
            
            const overlay = document.getElementById('exportOverlay');
            const bar = document.getElementById('exportBar');
            overlay.classList.remove('hidden');
            
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const canvasStream = canvas.captureStream(60);
            const audioDest = audioCtx.createMediaStreamDestination();
            
            source.disconnect();
            source.connect(analyser);
            source.connect(audioDest);
            source.connect(audioCtx.destination);

            const combined = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...audioDest.stream.getAudioTracks()
            ]);

            const recorder = new MediaRecorder(combined, { 
                mimeType: 'video/webm;codecs=vp9,opus',
                audioBitsPerSecond: 192000,
                videoBitsPerSecond: 8000000 
            });

            const chunks = [];
            
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SpectrumPro_Video_Export.mp4`;
                a.click();
                overlay.classList.add('hidden');
                
                source.disconnect();
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
            };

            audio.currentTime = 0;
            audio.play();
            recorder.start();

            const updateProg = setInterval(() => {
                const p = (audio.currentTime / audio.duration) * 100;
                bar.style.width = (p || 0) + '%';
                
                if(audio.ended || audio.paused) {
                    recorder.stop();
                    audio.pause();
                    clearInterval(updateProg);
                }
            }, 100);
        };

        const playBtn = document.getElementById('playBtn');
        playBtn.onclick = () => {
            if(audio.paused) { audio.play(); playBtn.innerHTML='<i class="fas fa-pause"></i>'; }
            else { audio.pause(); playBtn.innerHTML='<i class="fas fa-play"></i>'; }
        };

        audio.ontimeupdate = () => {
            document.getElementById('progressBar').style.width = (audio.currentTime/audio.duration)*100 + '%';
        };

        function setFormat(m) {
            const w = document.getElementById('canvasWrapper');
            if(m==='shorts') w.classList.add('shorts-mode');
            else w.classList.remove('shorts-mode');
            setTimeout(resize, 100);
        }

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
